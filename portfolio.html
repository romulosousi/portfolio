function mesesEntre(a, b) {
  const [ya, ma] = a.split("-").map(Number);
  const [yb, mb] = b.split("-").map(Number);
  return Math.max(1, (yb - ya) * 12 + (mb - ma));
}

/* ───────────────── Sparkline ───────────────── */
function Spark({ data, color = "#3dff8e", width = 64, height = 18 }) {
  const min = Math.min(...data), max = Math.max(...data);
  const span = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / span) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return (
    <svg width={width} height={height} className="block">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.25" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

/* ───────────────── Live clock ───────────────── */
function useClock() {
  const [t, setT] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return t;
}
const fmtTime = (d) => d.toLocaleTimeString("pt-BR", { hour12: false });
const fmtDate = (d) => d.toLocaleDateString("pt-BR", { day: "2-digit", month: "short", year: "numeric" }).toUpperCase();

          title={<>{T.sk_title_a} <span className="serif text-[var(--green)] font-normal">{T.sk_title_b}</span></>}
        />
        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-px bg-[var(--line)] hairline rounded-[4px] overflow-hidden">
          {groups.map((g) => (
            <div key={g.titulo} className="bg-[var(--bg-1)] p-5">

                <span className="mono text-[10px] text-[var(--fg-3)]">{g.items.length}</span>
              </div>
              <div className="flex flex-wrap gap-1.5">

}

/* ───────────────── Demo (DOM-RJ) ───────────────── */
function Demo() {
  const { t: T, lang } = useT();
  const [nome, setNome] = useState("João da Silva");
  const [data, setData] = useState("2025-04-15");
  const [logs, setLogs] = useState([]);
  const [running, setRunning] = useState(false);
  const [resultado, setResultado] = useState(null);
  const terminalRef = useRef(null);

  useEffect(() => {
    if (terminalRef.current) terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
  }, [logs]);

  const log = (texto, tipo = "info") => {
    const time = new Date().toLocaleTimeString("pt-BR", { hour12: false });
    setLogs(prev => [...prev, { time, texto, tipo, id: Date.now() + Math.random() }]);
  };
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  const fmtDataBR = (iso) => {
    const [y, m, d] = iso.split("-");
    return `${d}/${m}/${y}`;
  };

  const executar = async () => {
    if (!nome.trim()) return;
    setRunning(true); setLogs([]); setResultado(null);
    const dataBR = fmtDataBR(data);
    const edicao = `Nº ${70 + (parseInt(data.replace(/-/g, "")) % 30)}`;
    const totalPaginas = 80 + (nome.length * 3) % 60;

    log("init worker.dom_rj_search pid=4821", "ok");
    await sleep(320);
    log(`config: nome="${nome}" data=${dataBR}`, "muted");
    await sleep(360);
    log("conectando ao DOM-RJ (doweb.rio.rj.gov.br)...", "info");
    await sleep(520);
    log(`GET /portal/edicoes/?dt=${data}`, "muted");
    await sleep(420);
    log(`200 OK · edição localizada (${edicao})`, "ok");
    await sleep(340);
    log("baixando PDF da edição diária...", "info");
    await sleep(620);
    log(`200 OK · ${totalPaginas} páginas · 4.2 MB`, "ok");
    await sleep(360);
    log("extraindo texto (pdfminer) e indexando por caderno", "muted");
    await sleep(540);
    log(`buscando ocorrências de "${nome}"...`, "info");
    await sleep(480);

    // mock results
    const trechos = MOCK_TRECHOS[lang];
    const qtd = 2 + (nome.length % 3);
    const recortes = [];
    for (let i = 0; i < qtd; i++) {
      const tr = trechos[i % trechos.length].replace(/\{NOME\}/g, nome).replace("{NN}", String(100 + i * 7));
      recortes.push({
        id: i,
        page: 12 + i * 9 + (nome.length % 5),
        section: MOCK_CADERNOS[i % MOCK_CADERNOS.length],
        text: tr,
      });
    }

    log(`${qtd} ocorrência(s) encontrada(s)`, "ok");
    await sleep(280);
    log("done [3.1s] ✓", "ok");

    setResultado({ nome, dataBR, edicao, totalPaginas, runtime: "3,1s", recortes });
    setRunning(false);
  };

  return (
    <section id="demo" className="border-b border-[var(--line)]">
      <div className="max-w-[1280px] mx-auto px-6 py-16">
        <SectionHead
          idx="02"
          tag={T.demo_tag}
          title={<>{T.demo_title_a} <span className="serif text-[var(--green)] font-normal">{T.demo_title_b}</span></>}
          sub={T.demo_sub}
        />

        <div className="grid lg:grid-cols-12 gap-4">
          <div className="lg:col-span-4 hairline rounded-[4px] bg-[var(--bg-1)]">
            <div className="flex items-center justify-between px-4 h-9 border-b border-[var(--line)]">
              <span className="mono text-[10px] uppercase tracking-[0.12em] text-[var(--fg-2)]">{T.demo_params}</span>
              <span className="mono text-[10px] text-[var(--green)]">● {T.demo_ready}</span>
            </div>
            <div className="p-4 space-y-4">
              <label className="block">
                <div className="mono text-[10px] uppercase tracking-[0.1em] text-[var(--fg-2)] mb-1.5">{T.demo_name}</div>
                <input type="text" value={nome} onChange={(e)=>setNome(e.target.value)}
                  placeholder={T.demo_name_ph}
                  className="field w-full px-3 h-10 mono text-[13px]" />
              </label>

              <label className="block">
                <div className="mono text-[10px] uppercase tracking-[0.1em] text-[var(--fg-2)] mb-1.5">{T.demo_date}</div>
                <input type="date" value={data} onChange={(e)=>setData(e.target.value)}
                  className="field w-full px-3 h-10 mono text-[13px] tnum" />
              </label>

              <button onClick={executar} disabled={running || !nome.trim()}
                className="w-full h-11 rounded-[3px] mono text-[12px] uppercase tracking-[0.1em] font-semibold flex items-center justify-center gap-2 transition-colors disabled:opacity-60 disabled:cursor-not-allowed bg-[var(--green)] text-black hover:bg-white">
                {running ? (<>
                  <span className="w-3 h-3 border-2 border-black border-t-transparent rounded-full spin"></span>
                  {T.demo_running}
                </>) : (<>
                  <span className="w-1.5 h-1.5 bg-black"></span>
                  {T.demo_run}
                  <span className="opacity-50">↵</span>
                </>)}
              </button>

              <div className="pt-3 border-t border-[var(--line)] mono text-[10px] text-[var(--fg-2)] flex items-center justify-between">
                <span>{T.demo_source}</span>
                <span className="text-[var(--amber)]">{T.demo_mock}</span>
              </div>
            </div>
          </div>

          <div className="lg:col-span-8 space-y-4">
            <div className="hairline rounded-[4px] bg-[#06080a] overflow-hidden">
              <div className="flex items-center justify-between px-4 h-9 border-b border-[var(--line)] bg-[var(--bg-1)]">
                <div className="flex items-center gap-2">
                  <div className="flex gap-1">
                    <span className="w-2 h-2 rounded-full bg-[#3a3f47]"></span>
                    <span className="w-2 h-2 rounded-full bg-[#3a3f47]"></span>
                    <span className="w-2 h-2 rounded-full bg-[var(--green-dim)]"></span>
                  </div>
                  <span className="mono text-[10px] uppercase tracking-[0.1em] text-[var(--fg-2)] ml-2">/var/log/worker.dom_rj.log</span>
                </div>
                <span className="mono text-[10px] text-[var(--fg-2)]">tail -f</span>
              </div>
              <div ref={terminalRef} className="term-scroll p-4 mono text-[12px] leading-[1.75] text-[var(--fg-1)] overflow-y-auto" style={{minHeight: 260, maxHeight: 320}}>
                {logs.length === 0 && !running && (
                  <div className="text-[var(--fg-3)]">
                    <span className="text-[var(--green-dim)]">$</span> {T.demo_log_wait}
                    <span className="cursor inline-block w-1.5 h-3.5 bg-[var(--green)] align-middle ml-1"></span>
                  </div>
                )}
                {logs.map(e => (
                  <div key={e.id} className="log-line">
                    <span className="text-[var(--fg-3)]">[{e.time}]</span>{" "}
                    <span className={
                      e.tipo === "ok"   ? "text-[var(--green)]" :
                      e.tipo === "info" ? "text-[var(--blue)]"  :
                                          "text-[var(--fg-3)]"
                    }>
                      {e.tipo === "ok" ? "✓" : e.tipo === "info" ? "→" : "·"}
                    </span>{" "}
                    <span className={e.tipo === "muted" ? "text-[var(--fg-2)]" : "text-[var(--fg-0)]"}>{e.texto}</span>
                  </div>
                ))}
                {running && <span className="cursor inline-block w-1.5 h-3.5 bg-[var(--green)] align-middle ml-1"></span>}
              </div>
            </div>

            {resultado ? (
              <>
                <div className="grid grid-cols-2 md:grid-cols-4 hairline rounded-[4px] overflow-hidden bg-[var(--bg-1)]">
                  {[
                    { l: T.demo_res_found,   v: String(resultado.recortes.length), green: true },
                    { l: T.demo_res_pages,   v: String(resultado.totalPaginas) },
                    { l: T.demo_res_edition, v: resultado.edicao, accent: true },
                    { l: T.demo_res_runtime, v: resultado.runtime },
                  ].map((m, i) => (
                    <div key={i} className={`px-4 py-4 ${i>0 ? "border-l border-[var(--line)]" : ""}`}>
                      <div className="mono text-[10px] uppercase tracking-[0.1em] text-[var(--fg-2)] mb-2">{m.l}</div>
                      <div className={`mono tnum text-[18px] ${m.green ? "text-[var(--green)]" : m.accent ? "text-[var(--fg-0)]" : "text-[var(--fg-1)]"}`}>{m.v}</div>
                    </div>
                  ))}
                </div>

                <div className="hairline rounded-[4px] bg-[var(--bg-1)]">
                  <div className="flex items-center justify-between px-4 h-9 border-b border-[var(--line)]">
                    <div className="flex items-center gap-3">
                      <span className="mono text-[10px] uppercase tracking-[0.12em] text-[var(--fg-2)]">recortes.json</span>
                      <span className="mono text-[10px] text-[var(--fg-3)]">·</span>
                      <span className="mono text-[10px] text-[var(--fg-1)]">"{resultado.nome}"</span>
                      <span className="mono text-[10px] text-[var(--fg-3)]">{resultado.dataBR}</span>
                    </div>
                    <div className="mono text-[10px] text-[var(--green)]">{resultado.recortes.length} {T.demo_res_found}</div>
                  </div>
                  <div className="divide-y divide-[var(--line)]">
                    {resultado.recortes.map((r) => (
                      <div key={r.id} className="px-4 py-3.5 row-hover">
                        <div className="flex items-center justify-between flex-wrap gap-2 mb-1.5">
                          <div className="flex items-center gap-3 mono text-[10px] uppercase tracking-[0.08em] text-[var(--fg-2)]">
                            <span className="text-[var(--green)]">{T.demo_clip_page} {r.page}</span>
                            <span className="text-[var(--fg-3)]">·</span>
                            <span>{T.demo_clip_section}: <span className="text-[var(--fg-1)] normal-case tracking-normal">{r.section}</span></span>
                          </div>
                          <button className="mono text-[10px] uppercase tracking-[0.08em] text-[var(--fg-2)] hover:text-[var(--green)] transition-colors">{T.demo_open_pdf} ↗</button>
                        </div>
                        <p className="font-sans text-[14px] text-[var(--fg-0)] leading-[1.55]" dangerouslySetInnerHTML={{
                          __html: r.text.replace(new RegExp(resultado.nome.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'),
                            `<mark style="background:rgba(61,255,142,0.18);color:var(--green);padding:0 2px;border-radius:2px;">${resultado.nome}</mark>`)
                        }} />
                      </div>
                    ))}
                  </div>
                </div>
              </>
            ) : (
              <div className="hairline rounded-[4px] bg-[var(--bg-1)] p-8 text-center mono text-[11px] uppercase tracking-[0.1em] text-[var(--fg-3)]">
                <div className="mb-3 text-[var(--fg-2)]">{T.demo_empty_a}</div>
                <div>{T.demo_empty_b} <span className="text-[var(--green)]">{T.demo_run.toUpperCase()}</span></div>
              </div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}
